name: n8n
version: "1.104.0"
upstream: 1.62.4
slug: n8n
description: >-
  n8n是一个可扩展的工作流自动化工具。凭借公平的代码分发模式，n8n将始终拥有可见的源代码，可以自托管，并允许你添加自己的自定义函数、逻辑和应用程序。n8n基于节点的 подход 使其具有高度多功能性，能够将任何事物连接到任何其他事物。
arch:
  - amd64
  - aarch64
url: "https://ghfast.top/github.com/jdeath/homeassistant-addons"
ports:
  5678/tcp: 5678
ports_description:
  5678/tcp: "Web Interface"
map:
  - type: addon_config
    read_only: false
    path: /home/node/
environment:
  PUID: "1"
  PGID: "1"
  N8N_SECURE_COOKIE: "false"
  TINI_SUBREAPER: "true"
image: docker.n8n.io/n8nio/n8n
boot: auto
startup: services
webui: "[PROTO:ssl]://[HOST]:[PORT:5678]"
ingress: false
ingress_port: 5678
