name: Build and Push to GHCR (Multi-Arch, Multi-Addon)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'hassio-addons/**'
      - '.github/workflows/builder.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch: [amd64, arm64]
        addon: [jdxb]  # 如果你有多个 Add-on，可添加更多

    permissions:
      contents: read
      packages: write

    env:
      DEFAULT_BUILD_FROM_amd64: alpine:3.21.3
      DEFAULT_BUILD_FROM_aarch64: alpine:3.21.3

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install yq for YAML parsing
        uses: mikefarah/yq@v4

      - name: Get lowercase repo owner
        run: echo "REPO_OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Extract BUILD_FROM and BUILD_ARCH
        id: extract_build_from
        run: |
          # 将 arm64 映射为 aarch64（Docker标准名 => HA社区/你的命名）
          if [[ "${{ matrix.arch }}" == "arm64" ]]; then
            BUILD_ARCH="aarch64"
          else
            BUILD_ARCH="${{ matrix.arch }}"
          fi

          ADDON_DIR=hassio-addons/${{ matrix.addon }}
          YAML_PATH="$ADDON_DIR/build.yaml"

          if [[ -f "$YAML_PATH" ]]; then
            BUILD_FROM=$(yq e ".build_from.${BUILD_ARCH}" "$YAML_PATH")
          else
            BUILD_FROM="${{ env.DEFAULT_BUILD_FROM_${BUILD_ARCH} }}"
          fi

          echo "BUILD_ARCH=$BUILD_ARCH" >> $GITHUB_ENV
          echo "BUILD_FROM=$BUILD_FROM" >> $GITHUB_ENV
          echo "ADDON_NAME=${{ matrix.addon }}" >> $GITHUB_ENV

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.addon }} for ${{ matrix.arch }}
        uses: docker/build-push-action@v5
        with:
          context: hassio-addons/${{ matrix.addon }}
          file: hassio-addons/${{ matrix.addon }}/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: |
            ghcr.io/${{ env.REPO_OWNER_LC }}/${{ matrix.addon }}-${{ env.BUILD_ARCH }}:1.1.1
          build-args: |
            BUILD_FROM=${{ env.BUILD_FROM }}
            BUILD_ARCH=${{ env.BUILD_ARCH }}
